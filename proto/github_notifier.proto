syntax = "proto3";

package github_notifier;

service GitHubNotifier {
  rpc Subscribe           (SubscribeRequest)        returns (MessageResponse);
  rpc ConfirmSubscription (TokenRequest)            returns (MessageResponse);
  rpc Unsubscribe         (TokenRequest)            returns (MessageResponse);
  rpc GetSubscriptions    (GetSubscriptionsRequest) returns (GetSubscriptionsResponse);
}

message SubscribeRequest        { string email = 1; string repo = 2; }
message TokenRequest            { string token = 1; }
message GetSubscriptionsRequest { string email = 1; }
message MessageResponse         { string message = 1; }

message SubscriptionItem {
  string email         = 1;
  string repo          = 2;
  bool   confirmed     = 3;
  string last_seen_tag = 4;
}

message GetSubscriptionsResponse {
  repeated SubscriptionItem subscriptions = 1;
}
