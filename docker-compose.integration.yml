services:
  postgres-test:
    image: postgres:18-alpine
    platform: linux/arm64
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: github_notifier_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d github_notifier_test"]
      interval: 3s
      timeout: 3s
      retries: 10
