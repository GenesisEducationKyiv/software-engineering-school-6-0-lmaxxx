filebeat.inputs:
  - type: container
    paths:
      - '/var/lib/docker/containers/*/*.log'
    processors:
      - add_docker_metadata:
          host: "unix:///var/run/docker.sock"
      - decode_json_fields:
          fields: ["message"]
          target: ""
          overwrite_keys: true

output.elasticsearch:
  hosts: ["elasticsearch:9200"]
  index: "github-notifier-%{+yyyy.MM.dd}"

setup.ilm.enabled: false
setup.template.name: "github-notifier"
setup.template.pattern: "github-notifier-*"
