services:
  postgres-e2e:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: github_notifier_e2e
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d github_notifier_e2e"]
      interval: 3s
      timeout: 3s
      retries: 10

  mailhog-e2e:
    image: mailhog/mailhog
    ports:
      - "1025:1025"

  mock-github:
    build:
      context: .
      dockerfile: tests/e2e/mock-server/Dockerfile
    ports:
      - "4001:4000"

  app-e2e:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres-e2e:
        condition: service_healthy
      mock-github:
        condition: service_started
      mailhog-e2e:
        condition: service_started
    environment:
      DATABASE_URL: postgres://app:secret@postgres-e2e:5432/github_notifier_e2e
      GITHUB_API_BASE_URL: http://mock-github:4000
      REDIS_URL: ""
      SMTP_HOST: mailhog-e2e
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@e2e.local
      BASE_URL: http://localhost:3000
      NODE_ENV: test
      SCAN_INTERVAL_MS: "999999999"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
