openapi: 3.0.3
info:
  title: GitHub Release Notification API
  description: Subscribe to email notifications for new GitHub repository releases.
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

paths:
  /api/subscribe:
    post:
      summary: Subscribe to release notifications
      description: |
        Subscribe an email address to release notifications for a GitHub repository.
        Sends a confirmation email with a link to activate the subscription.
        If the subscription already exists but is unconfirmed, resends the confirmation email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRequest'
            example:
              email: user@example.com
              repo: golang/go
      responses:
        '200':
          description: Subscription created (or confirmation email resent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Confirmation email sent
        '400':
          description: Invalid request (missing fields or invalid repo format)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Invalid repo format. Expected owner/repo
        '404':
          description: GitHub repository not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Repository not found on GitHub
        '409':
          description: Subscription already confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Already subscribed
        '429':
          description: GitHub API rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: GitHub rate limit exceeded. Try again later.

  /api/confirm/{token}:
    get:
      summary: Confirm email subscription
      description: Confirms a subscription using the token from the confirmation email.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Confirmation token from the email link
      responses:
        '200':
          description: Subscription confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Subscription confirmed
        '400':
          description: Subscription already confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Subscription already confirmed
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Token not found

  /api/unsubscribe/{token}:
    get:
      summary: Unsubscribe from release notifications
      description: Removes a subscription using the token from notification emails.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Unsubscribe token from notification emails
      responses:
        '200':
          description: Successfully unsubscribed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Unsubscribed successfully
        '404':
          description: Token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Token not found

  /api/subscriptions:
    get:
      summary: List active subscriptions for an email
      description: Returns all confirmed subscriptions for the given email address.
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
          description: Email address to look up subscriptions for
      responses:
        '200':
          description: List of confirmed subscriptions (may be empty)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscription'
              example:
                - id: 1
                  email: user@example.com
                  repo: golang/go
                  confirmed: true
                  created_at: '2024-01-15T10:30:00.000Z'
        '400':
          description: Missing or invalid email parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: Email is required

components:
  schemas:
    SubscribeRequest:
      type: object
      required:
        - email
        - repo
      properties:
        email:
          type: string
          format: email
          description: Email address to send notifications to
        repo:
          type: string
          pattern: '^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$'
          description: GitHub repository in owner/repo format
          example: golang/go

    Subscription:
      type: object
      properties:
        id:
          type: integer
          description: Subscription ID
        email:
          type: string
          format: email
        repo:
          type: string
          description: GitHub repository in owner/repo format
        confirmed:
          type: boolean
          description: Whether the subscription has been confirmed
        created_at:
          type: string
          format: date-time
          description: When the subscription was created

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
