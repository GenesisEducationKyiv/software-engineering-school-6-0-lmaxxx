<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Release Notifier</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 480px;
      margin: 80px auto;
      padding: 0 16px;
      color: #24292f;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.subtitle { color: #57606a; margin-bottom: 24px; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 4px; }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 16px;
    }
    input:focus { outline: 2px solid #0969da; border-color: transparent; }
    button {
      width: 100%;
      padding: 10px;
      background: #2da44e;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #2c974b; }
    button:disabled { background: #94d3a2; cursor: not-allowed; }
    #message {
      display: none;
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    #message.success { background: #dafbe1; color: #116329; border: 1px solid #aceebb; }
    #message.error   { background: #ffebe9; color: #82071e; border: 1px solid #ffcecb; }
  </style>
</head>
<body>
  <h1>GitHub Release Notifier</h1>
  <p class="subtitle">Get email notifications when a repository publishes a new release.</p>
  <form id="subscribe-form">
    <label for="email">Email address</label>
    <input id="email" type="email" name="email" placeholder="you@example.com" required />

    <label for="repo">Repository</label>
    <input id="repo" type="text" name="repo" placeholder="owner/repo" required />

    <button type="submit" id="submit-btn">Subscribe</button>
  </form>
  <div id="message"></div>

  <script>
    const form = document.getElementById('subscribe-form');
    const btn  = document.getElementById('submit-btn');
    const msg  = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      msg.style.display = 'none';

      const email = document.getElementById('email').value.trim();
      const repo  = document.getElementById('repo').value.trim();

      try {
        const res = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, repo }),
        });

        const data = await res.json();

        if (res.status === 200) {
          msg.textContent = 'Check your email to confirm your subscription.';
          msg.className = 'success';
          form.reset();
        } else {
          msg.textContent = data.error || 'Something went wrong. Please try again.';
          msg.className = 'error';
        }
      } catch {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'error';
      } finally {
        msg.style.display = 'block';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
